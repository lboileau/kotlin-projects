spring:
  application:
    name: camper-service
  web:
    resources:
      static-locations: file:/app/static/
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/camper_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
